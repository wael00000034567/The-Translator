name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest # استخدام سيرفر بنظام لينكس

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # نسخة البايثون

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: flet build apk

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Translator-App-APK
          path: build/apk/**/*.apk
